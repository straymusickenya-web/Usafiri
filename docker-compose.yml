# ============================================================================
# docker-compose.yml - Usafiri Development
# ============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: usafiri_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-usafiri}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-usafiri}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - usafiri_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: usafiri_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - usafiri_network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: usafiri_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn usafiri.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - usafiri_network
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./accounts
          target: /app/accounts
        - action: sync
          path: ./drivers
          target: /app/drivers
        - action: sync
          path: ./payments
          target: /app/payments
        - action: sync
          path: ./ratings
          target: /app/ratings
        - action: sync
          path: ./core
          target: /app/core
        - action: sync
          path: ./templates
          target: /app/templates
        - action: rebuild
          path: requirements.txt

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: usafiri_celery_worker
    command: celery -A usafiri worker --loglevel=info --concurrency=2 --max-tasks-per-child=1000
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A usafiri inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - usafiri_network
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: usafiri_celery_beat
    command: celery -A usafiri beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - usafiri_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: usafiri_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - usafiri_network
    restart: unless-stopped

# Remove in Production, ONLY for Development
  ngrok:
    image: ngrok/ngrok:latest
    container_name: usafiri_ngrok
    command: http --url=confoundingly-anteroparietal-joey.ngrok-free.dev web:8000
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"  # ngrok dashboard
    depends_on:
      - web
    networks:
      - usafiri_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  usafiri_network:
    driver: bridge