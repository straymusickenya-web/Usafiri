# ============================================================================
# docker-compose.prod.yml — Production overrides (Dokploy)
# Point Dokploy at this file. It extends docker-compose.yml automatically
# when placed in the same repo, or reference it directly in Dokploy's
# "Compose file" setting as: docker-compose.prod.yml
#
# IMPORTANT: Set all env vars in Dokploy's Environment tab, NOT in a .env
# file committed to the repo.
# ============================================================================

version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: usafiri_web
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      exec gunicorn usafiri.wsgi:application
        --bind 0.0.0.0:8000
        --workers 4
        --threads 2
        --timeout 60
        --keep-alive 5
        --max-requests 1000
        --max-requests-jitter 100
        --access-logfile -
        --error-logfile -
        --log-level info
      "
    environment:
      - DJANGO_SETTINGS_MODULE=usafiri.settings
      - DEBUG=False
      - POSTGRES_HOST=db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - usafiri_network
      - dokploy-network
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: usafiri_celery_worker
    command: celery -A usafiri worker --loglevel=warning --concurrency=4 --max-tasks-per-child=1000
    environment:
      - DJANGO_SETTINGS_MODULE=usafiri.settings
      - DEBUG=False
      - POSTGRES_HOST=db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - usafiri_network
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: usafiri_celery_beat
    command: celery -A usafiri beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=usafiri.settings
      - DEBUG=False
      - POSTGRES_HOST=db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - usafiri_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: usafiri_nginx
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - usafiri_network
      - dokploy-network
    # labels:
    #    - "traefik.enable=true"
    #    - "traefik.docker.network=dokploy-network"
    #    - "traefik.http.routers.usafiri-web.rule=Host(`usafiri.co.ke`) || Host(`www.usafiri.co.ke`)"
    #    - "traefik.http.routers.usafiri-web.entrypoints=websecure"
    #    - "traefik.http.routers.usafiri-web.tls.certresolver=letsencrypt"
    #    - "traefik.http.services.usafiri-web.loadbalancer.server.port=80"
    #    # Redirect www to non-www
    #    - "traefik.http.routers.usafiri-www.rule=Host(`www.usafiri.co.ke`)"
    #    - "traefik.http.routers.usafiri-www.entrypoints=websecure"
    #    - "traefik.http.routers.usafiri-www.middlewares=redirect-www"
    #    - "traefik.http.middlewares.redirect-www.redirectregex.regex=^https://www\\.(.*)"
    #    - "traefik.http.middlewares.redirect-www.redirectregex.replacement=https://$${1}"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: usafiri_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-usafiri}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - usafiri_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: usafiri_redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - usafiri_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  usafiri_network:
    driver: bridge
  dokploy-network:
    external: true