# =============================================================================
# nginx/nginx.prod.conf — Production (behind Dokploy / Traefik)
#
# Dokploy (Traefik) owns SSL termination and port 443.
# This container only listens on port 80 internally — never exposed publicly.
# Traefik → nginx:80 → gunicorn:8000
#
# DO NOT add an ssl_certificate block or listen 443 here.
# DO NOT expose port 80 or 443 in docker-compose.prod.yml for this container —
# Dokploy connects to it over the internal Docker network.
# =============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    server_tokens     off;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # Use $http_x_forwarded_for (not $binary_remote_addr) because the real
    # client IP arrives in the X-Forwarded-For header from Traefik, not as
    # the TCP connection source (which will always be Traefik's internal IP).
    map $http_x_forwarded_for $real_client_ip {
        ""      $remote_addr;   # fallback if header is absent
        default $http_x_forwarded_for;
    }

    limit_req_zone  $real_client_ip zone=general:10m rate=30r/m;
    limit_req_zone  $real_client_ip zone=auth:10m    rate=10r/m;
    limit_req_zone  $real_client_ip zone=mpesa:10m   rate=60r/m;
    limit_conn_zone $real_client_ip zone=addr:10m;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream django {
        server web:8000;
        keepalive 32;
    }

    # ── Shared proxy settings ─────────────────────────────────────────────────
    proxy_http_version    1.1;
    proxy_set_header      Host              $host;
    proxy_set_header      X-Real-IP         $real_client_ip;
    proxy_set_header      X-Forwarded-For   $http_x_forwarded_for;
    proxy_set_header      X-Forwarded-Proto $http_x_forwarded_proto;  # passed through from Traefik
    proxy_set_header      Connection        "";
    proxy_redirect        off;
    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_buffer_size     4k;
    proxy_buffers         8 16k;

    # =========================================================================
    # Main server — HTTP only, internal network
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;           # accept any hostname; Traefik handles vhost routing

        client_max_body_size 20M;
        limit_conn addr 20;

        # ── Security headers ──────────────────────────────────────────────────
        # HSTS is intentionally omitted — Dokploy/Traefik sets it at the TLS layer.
        # Setting it here over HTTP has no effect and can cause issues.
        add_header X-Frame-Options        "DENY"          always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;
        # Tighten CSP once you've inventoried your templates' external dependencies:
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self';" always;

        # ── Static files ──────────────────────────────────────────────────────
        location /static/ {
            alias   /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            gzip_static on;
        }

        # ── Media files ───────────────────────────────────────────────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";

            # Block executable/sensitive file types from being served directly.
            location ~* \.(php|py|sh|env|sql)$ {
                deny all;
            }
        }

        # ── Auth endpoints — tight rate limit ─────────────────────────────────
        location ~* ^/(accounts/login|accounts/signup) {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://django;
        }

        # ── M-Pesa callback ───────────────────────────────────────────────────
        location /payments/mpesa/ {
            limit_req zone=mpesa burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://django;
        }

        # ── Everything else ───────────────────────────────────────────────────
        location / {
            limit_req zone=general burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://django;
        }
    }
}